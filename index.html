<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudant Dental — Designs</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #e8f4f8 0%, #f7fbfc 100%);
      color: #1d3a44;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin: 0 0 .25rem; font-weight: 700; }
    p.sub { margin: 0 0 2rem; color: #5a7681; }
    .cards { display: grid; gap: 1.25rem; width: 100%; max-width: 760px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    a.card {
      display: block;
      text-decoration: none;
      padding: 1.75rem 1.5rem;
      border-radius: 16px;
      background: #ffffff;
      color: #1d3a44;
      box-shadow: 0 6px 24px rgba(29,58,68,.08);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    a.card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(29,58,68,.16); }
    a.card .gem { font-size: 2rem; display: block; margin-bottom: .5rem; }
    a.card .name { font-size: 1.2rem; font-weight: 600; }
    a.card .ver { font-size: .85rem; color: #7a939d; }
    footer { margin-top: 2.5rem; font-size: .8rem; color: #88a2ac; }
  </style>
</head>
<body>
  <h1>Sudant Dental</h1>
  <p class="sub">Choose a design version</p>
  <div class="cards">
    <a class="card" href="sudant_dental_enamel.html">
      <span class="gem">🦷</span>
      <span class="name">Enamel</span><br />
      <span class="ver">Version 1</span>
    </a>
    <a class="card" href="sudant_dental_veneer.html">
      <span class="gem">✨</span>
      <span class="name">Veneer</span><br />
      <span class="ver">Version 2</span>
    </a>
    <a class="card" href="sudant_dental_crown.html">
      <span class="gem">👑</span>
      <span class="name">Crown</span><br />
      <span class="ver">Version 3</span>
    </a>
  </div>
  <footer>Hosted on GitHub Pages</footer>
</body>
</html>
